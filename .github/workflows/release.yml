name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - run: ./build.sh
      - run: gh release create "$GITHUB_REF_NAME" Timely.zip --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
